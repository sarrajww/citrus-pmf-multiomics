study:
  title: "Multi-Omics Biosynthesis Study: Polymethoxylated Flavonoids in Citrus reticulata cv. Chachiensis"
  short_title: "PMF Biosynthesis in Chachiensis Citrus"
  citation: >
    An integrated multi-omics approach reveals polymethoxylated flavonoid biosynthesis
    in Citrus reticulata cv. Chachiensis. Nature Communications (2024).
    DOI: https://doi.org/10.1038/s41467-024-48235-y
  authors: "Jiawen Wen#, Yayu Wang#, Xu Lu#, Huimin Pan#, Dian Jin, Jialing Wen, Canzhi Jin, Sunil Kumar Sahu, Jianmu Su, Xinyue Luo, Xiaohuan Jin, Jiao Zhao, Hong Wu, E-Hu Liu, Huan Liu"
  summary: >
    This study decodes the biosynthetic pathway for polymethoxylated flavonoids (PMFs)
    in Guangchenpi (Citrus reticulata cv. Chachiensis) using a chromosome-level genome assembly
    integrated with transcriptomics, metabolomics, and co-expression network analysis.
    A high-quality reference genome (~314.96 Mb, nine pseudochromosomes)
    was produced and anchored gene-metabolite correlations identified key O-methyltransferase
    (OMT) candidates. Functional validation via heterologous expression
    confirmed enzymatic activities for prioritized candidates, establishing a mechanistic
    foundation for PMF engineering in medicinal citrus.

deliverables:
  - id: D1
    label: "Chromosome-level genome assembly"
    detail: "~314.96 Mb; nine chromosomes; BUSCO completeness 97.7%"
  - id: D2
    label: "Genome annotation"
    detail: "29,722 protein-coding genes; repeat content 45.04%"
  - id: D3
    label: "Transcriptome atlas"
    detail: "RNA-seq across 6 tissues and seven developmental stages"
  - id: D4
    label: "Metabolite profiling"
    detail: "304 metabolites detected; 29 PMFs annotated"
  - id: D5
    label: "Co-expression modules"
    detail: "WGCNA modules correlated with PMF biosynthesis"
  - id: D6
    label: "Candidate gene list"
    detail: "47 OMT candidates; one (CcOMT1) functionally validated"
  - id: D7
    label: "Regulatory network"
    detail: "AP2/ERF-ERF TF candidates linked to PMF biosynthesis modules"

glossary:
  PMF: "Polymethoxylated Flavonoid — flavonoids with multiple methoxy substituents; bioactive compounds in Chenpi"
  OMT: "O-methyltransferase — enzyme that transfers methyl groups to oxygen atoms on flavonoid scaffolds"
  WGCNA: "Weighted Gene Co-expression Network Analysis — unsupervised clustering of co-regulated gene sets"
  BUSCO: "Benchmarking Universal Single-Copy Orthologs — genome completeness metric"
  DAG: "Directed Acyclic Graph — computational pipeline representation"
  Hi-C: "Chromosome conformation capture sequencing used for genome scaffolding"
  synteny: "Conservation of gene order across related genomes"

findings:
  - id: F1
    claim: "A chromosome-level reference genome was assembled for C. reticulata cv. Chachiensis"
    evidence_type: "Genome assembly + Hi-C scaffolding + BUSCO validation"
    artifacts: ["Genome FASTA", "GFF3 annotation", "BUSCO report"]
    why_it_matters: "First high-quality genome for this important Guangchenpi cultivar; enables synteny and comparative analyses"
    figure_ref: "Fig 1. Morphology and genome features of CRC"
  - id: F2
    claim: "PMF accumulation co-varies with expression of specific OMT gene subfamilies across tissues"
    evidence_type: "gene expression profile in a developmental stage manner;metabolomics profile; Pearson correlation"
    artifacts: ["Expression matrix", "Metabolite table", "Co-expression module membership file"]
    why_it_matters: "Anchors candidate selection in quantitative gene-metabolite relationships rather than homology alone"
  - id: F3
    claim: "CcOMT1 demonstrated 3’-position methyltransferase activity on PMF substrates in vitro"
    evidence_type: "Heterologous expression (E. coli BL21(DE3)) + LC-MS product verification"
    artifacts: ["Protein expression plasmids", "LC-MS spectra", "Kinetic parameters table","transient overexpression","VIGS"]
    why_it_matters: "Functional confirmation distinguishes active enzymes from non-functional paralogs"
  - id: F4
    claim: "AP2/ERF transcription factors co-regulate PMF biosynthesis genes in a developmental stage-specific manner"
    evidence_type: "Pearson correlation; WGCNA module-trait analysis; co-expression network; correlation network"
    artifacts: ["Regulatory network edge list", "Expression matrix of core regulated components on core vs non-core regions" ]
    why_it_matters: "Identifies transcriptional control nodes for engineering efforts"
    figure_ref: "Fig.7 The potential gene regulation network of PMF biosynthesis"

methods:
  genome:
    inputs: ["Nanopore long reads", "Hi-C paired-end reads", "BGISEQ short reads (polishing)"]
    steps:
      - "K-mer analysis for genome size estimation (GenomeScope)"
      - "Contig assembly (HiFiasm)"
      - "Hi-C scaffolding to chromosome scale (3D-DNA)"
      - "Repeat identification and masking (PILER / RepeatScout/ RepeatClassifier/ Tandem Repeats Finder/ RepeatModeler / RepeatMasker)"
      - "Structural annotation (BRAKER2; ab initio + homology + RNA-seq evidence)"
      - "Functional annotation (InterProScan, OrthoFinder, KEGG KAAS)"
      - "Quality assessment (BUSCO, mapping rate)"
    tools: ["HiFiasm", "3D-DNA", "BRAKER2", "RepeatMasker", "BUSCO", "OrthoFinder"]
    outputs: ["chr-level FASTA", "GFF3", "repeat library", "orthogroup assignments"]
  transcriptomics:
    inputs: ["RNA-seq FASTQ ( 200 more RNA-seq samples)"]
    steps:
      - "QC: Trimmomatic adapter trimming"
      - "Alignment to reference genome (STAR)"
      - "Transcript quantification (featureCounts)"
      - "Normalization: DESeq2"
      - "Differential expression analysis (DESeq2)"
      - "WGCNA co-expression network construction"
    tools: ["FastQC", "Trimmomatic", "STAR", "featureCounts", "DESeq2", "WGCNA"]
    outputs: ["Count matrix", "DESeq2 log2 matrix", "DE gene lists", "Module eigengene table"]
  metabolomics:
    inputs: ["Tissue across 15 samples); LC-MS/MS in positive and negative mode"]
    steps:
      - "Raw data processing: peak picking, alignment, gap filling (MZmine / XCMS)"
      - "Metabolite annotation: MS2 matching to databases (in-house PMF library)"
      - "Quantification: peak area normalization"
      - "Statistical analysis: PCA, OPLS-DA for tissue separation"
    tools: ["XCMS / MZmine", "SIRIUS+CSI:FingerID", "MetaboAnalyst"]
    outputs: ["Feature table (m/z × sample)", "Annotated metabolite list", "PCA scores"]
  integration:
    inputs: ["DESeq2 vst matrix", "Metabolite abundance table", "Module eigengene matrix"]
    steps:
      - "Pearson correlation: gene expression vs PMF metabolite levels"
      - "WGCNA module-trait correlation with PMF accumulation phenotype"
      - "The expression profile of potential regulator genes between the core region and other regions"
    tools: ["R (ggplot2)", "WGCNA"]
    outputs: ["Ranked candidate gene list", "Co-expression network edge list"]
  validation:
    inputs: ["Synthesized / codon-optimized candidate ORFs"]
    steps:
      - "Cloning into expression vector (pET / pYES)"
      - "Heterologous expression in E. coli BL21"
      - "Protein purification (His-tag affinity)"
      - "In vitro enzyme assay with PMF substrates + SAM cofactor"
      - "LC-MS/MS product verification and kinetic parameter determination"
    tools: ["Standard molecular cloning", "LC-MS/MS", "GraphPad Prism"]
    outputs: ["Confirmed enzyme activities", "Km/Vmax table", "LC-MS spectra"]

impact:
  scientific:
    - "First chromosome-level genome for C. reticulata cv. Chachiensis provides a reference for Citrus genomics"
    - "Mechanistic resolution of PMF O-methylation steps from naringenin scaffold to final products"
    - "Demonstrates WGCNA-guided candidate prioritization as an effective multi-omics strategy in specialized metabolism"
    - "Phylogenomic evidence for tandem duplication as driver of OMT family diversification in Citrus"
  resource:
    - "Publicly deposited genome assembly and annotation (accession:GWHERQK00000000 and GWHERPZ00000000)"
    - "Raw sequencing data available via accession: CNGBdb CNP0003922 and CNP0003929)"
    - "Metabolomics dataset deposited in MetaboLights accession: MTBLS9832)"
  translational:
    - "Validated OMT enzymes are direct candidates for metabolic engineering of PMF production"
    - "Genome + candidate gene resource supports breeding programs for high-PMF Chenpi cultivars"
    - "Pathway knowledge enables synthetic biology reconstruction in heterologous hosts"
  follow_ups:
    - "Resolve remaining uncharacterized steps using additional candidate validation"
    - "Engineer full PMF pathway in yeast chassis for de novo production"
    - "CRISPR-based perturbation of AP2/ERF regulators to test predicted regulatory role"
    - "Comparative genomics across Citrus species to trace PMF pathway evolution"
    - "Population genomics study using this genome as reference to map PMF QTLs in Guangchenpi germplasm"

resources:
  paper_doi: "https://doi.org/10.1038/s41467-024-48235-y"
  genome_accession: "GWHERQK00000000"
  rnaseq_accession: " CNGBdb: CNP0003922"
  metabolomics_accession: "MetaboLights:MTBLS9832"
